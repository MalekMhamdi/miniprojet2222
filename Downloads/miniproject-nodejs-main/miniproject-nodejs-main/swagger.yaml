openapi: 3.0.0

info:
  title: API Recouvra+
  version: 1.0.0
  description: API de gestion du recouvrement

servers:
  - url: http://localhost:3000
    description: Serveur de développement

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:

  /api/auth/register:
    post:
      summary: Inscrire un nouvel utilisateur
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [agent, manager, admin]
      responses:
        '201':
          description: Utilisateur créé

  /api/auth/login:
    post:
      summary: Se connecter
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Succès

  /api/clients:
    get:
      summary: Récupérer tous les clients
      tags: [Clients]
      responses:
        '200':
          description: Liste des clients

    post:
      summary: Créer un client
      tags: [Clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: Client créé

  /api/factures:
    get:
      summary: Récupérer toutes les factures
      tags: [Factures]
      responses:
        '200':
          description: Liste des factures

    post:
      summary: Créer une facture
      tags: [Factures]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client, montant]
              properties:
                client:
                  type: string
                montant:
                  type: number
                dateEmission:
                  type: string
                  format: date
      responses:
        '201':
          description: Facture créée

  /api/paiements:
    get:
      summary: Récupérer les paiements
      tags: [Paiements]
      responses:
        '200':
          description: Liste des paiements

    post:
      summary: Enregistrer un paiement
      tags: [Paiements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facture, montant]
              properties:
                facture:
                  type: string
                montant:
                  type: number
                datePaiement:
                  type: string
                  format: date
      responses:
        '201':
          description: Paiement enregistré

  /api/actions:
    get:
      summary: Récupérer les actions de recouvrement
      tags: [Actions]
      responses:
        '200':
          description: Liste des actions

    post:
      summary: Enregistrer une action
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facture, type]
              properties:
                facture:
                  type: string
                type:
                  type: string
                  enum: [appel, email, visite]
                commentaire:
                  type: string
      responses:
        '201':
          description: Action enregistrée

  /api/stats:
    get:
      summary: Voir les statistiques
      tags: [Stats]
      responses:
        '200':
          description: Statistiques du système